name: Content Checks

on:
  push:
    branches:
    - main
  pull_request:
  workflow_dispatch:

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: "3.3"
        bundler-cache: true

    - name: Validate YAML data schema
      run: ruby scripts/validate_data.rb

    - name: Build site
      run: bundle exec jekyll build

    - name: Check internal links
      run: ruby scripts/check_site_links.rb
